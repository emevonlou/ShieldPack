<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShieldPack</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>ShieldPack</h1>
      <p class="subtitle">
        Verifique senhas e e-mails expostos em vazamentos, com foco em privacidade.
      </p>

      <!-- 🔐 SENHA -->
      <h2>Verificar senha</h2>
      <input id="password" type="password" placeholder="Digite a senha" />
      <button id="checkPasswordBtn">Verificar senha</button>

      <!-- ✉️ EMAIL -->
      <h2>Verificar e-mail</h2>
      <input id="email" type="email" placeholder="Digite seu e-mail" />
      <button id="checkEmailBtn">Verificar e-mail</button>

      <div id="result" class="result hidden"></div>

      <p class="note">
        Suas informações são tratadas com foco em privacidade.
      </p>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
